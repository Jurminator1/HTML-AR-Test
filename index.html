<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: transparent; }
      #controls {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        display: grid; grid-template-columns: 70px 70px 70px; gap: 15px; z-index: 1000;
      }
      button {
        width: 70px; height: 70px; background: rgba(0, 0, 0, 0.7); color: white;
        border: 2px solid #00ff00; border-radius: 50%; font-size: 12px; font-weight: bold;
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>

    <div id="controls">
      <div></div><button id="up">UP</button><div></div>
      <button id="left">LEFT</button><button id="down">DOWN</button><button id="right">RIGHT</button>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      renderer="alpha: true; colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
      </a-assets>

      <a-entity id="plane" 
                gltf-model="#planeModel" 
                position="0 1.2 -1" 
                scale="0.2 0.2 0.2"
                rotation="0 180 0">
          <a-sphere radius="0.1" color="red" opacity="0.5"></a-sphere>
      </a-entity>

      <a-entity camera look-controls></a-entity>
      
      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="1 1 1"></a-light>
    </a-scene>

    <script>
  const plane = document.querySelector('#plane');
let move = { up: false, down: false, left: false, right: false };

// Adjusted speeds for 0.02 scale
const forwardSpeed = 0.01; 
const turnSpeed = 2.5;     
const verticalSpeed = 0.01;

const bind = (id, dir) => {
  const btn = document.getElementById(id);
  btn.ontouchstart = (e) => { e.preventDefault(); move[dir] = true; };
  btn.ontouchend = () => move[dir] = false;
  btn.onmousedown = () => move[dir] = true;
  btn.onmouseup = () => move[dir] = false;
};

['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));

function update() {
  let pos = plane.getAttribute('position');
  let rot = plane.getAttribute('rotation');

  // 1. Steering (Rotation around Y axis)
  if (move.left) rot.y += turnSpeed;
  if (move.right) rot.y -= turnSpeed;

  // 2. Altitude (Movement along Y axis)
  if (move.up) pos.y += verticalSpeed;
  if (move.down) pos.y -= verticalSpeed;

  // 3. Constant Forward Movement
  // We use the Y rotation to determine the X and Z direction
  const angleRad = rot.y * (Math.PI / 180);
  
  // These calculations ensure it moves horizontally
  pos.x += Math.sin(angleRad) * forwardSpeed;
  pos.z += Math.cos(angleRad) * forwardSpeed;

  plane.setAttribute('position', pos);
  plane.setAttribute('rotation', rot);
  
  requestAnimationFrame(update);
}

update();
    </script>
  </body>
</html>
