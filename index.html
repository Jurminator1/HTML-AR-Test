<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
      
      /* NAVIGATION */
      #main-menu { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; gap: 8px; pointer-events: auto; }
      .nav-btn { padding: 10px 12px; background: rgba(0,0,0,0.85); color: white; border: 2px solid #fff; border-radius: 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
      .nav-btn.active { background: #ffff00; color: #000; border-color: #ffff00; }

      /* UI BOXES */
      #game-ui, #car-ui, #const-ui, #win-panel { display: none; position: absolute; pointer-events: auto; }
      
      #game-ui { width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
      #score-tag { position: absolute; top: 80px; left: 20px; color: #ffff00; background: rgba(0,0,0,0.8); padding: 8px 15px; border: 2px solid #ffff00; pointer-events: auto; font-weight: bold; }
      #radar-center { position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; }
      #arrow { position: absolute; bottom: 85px; left: -20px; width: 40px; height: 50px; background-color: #ffff00; clip-path: polygon(50% 0%, 100% 45%, 75% 45%, 75% 100%, 25% 100%, 25% 45%, 0% 45%); }
      
      #controls-container { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
      .btn-row { display: flex; justify-content: center; gap: 12px; margin: 6px 0; }
      .ctrl-btn { width: 65px; height: 65px; background: rgba(0,0,0,0.8); color: white; border: 2px solid #fff; border-radius: 50%; font-weight: bold; touch-action: manipulation; }

      #win-panel { top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.95); padding: 25px; border: 3px solid #ffff00; border-radius: 15px; z-index: 1100; min-width: 240px; }
      #car-ui, #const-ui { bottom: 40px; width: 100%; text-align: center; }
      
      .action-btn { padding: 12px 18px; margin: 5px; background: #00ccff; border: 2px solid white; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; text-transform: uppercase; }
      .dist-btn { background: #ff9900; } 
      .qr-hint { background: rgba(0,0,0,0.8); color: #ff33bb; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ff33bb; font-size: 12px; display: inline-block; }
    </style>
  </head>
  <body>

    <div id="ui-layer">
      <div id="main-menu">
        <button class="nav-btn" id="btn-game" onclick="switchMode('game')">SPIEL</button>
        <button class="nav-btn" id="btn-car" onclick="switchMode('car')">AUTO</button>
        <button class="nav-btn" id="btn-video" onclick="switchMode('video')">BAUSTELLE</button>
      </div>

      <div id="game-ui">
        <div id="score-tag">PUNKTE: <span id="score">0</span>/5</div>
        <div id="radar-center"><div id="arrow"></div></div>
        <div id="controls-container">
          <div class="btn-row"><button class="ctrl-btn" id="up">HOCH</button></div>
          <div class="btn-row"><button class="ctrl-btn" id="left">LINKS</button><button class="ctrl-btn" id="freeze" style="background:#0050ff">STOPP</button><button class="ctrl-btn" id="right">RECHTS</button></div>
          <div class="btn-row"><button class="ctrl-btn" id="down">RUNTER</button></div>
        </div>
      </div>

      <div id="win-panel">
        <h2 style="color: #ffff00; margin-top: 0;">GEWONNEN!</h2>
        <p style="color: white; font-size: 12px;">Klicke unten, um das Video zu starten</p>
        <button class="action-btn" onclick="playWinVideo()">▶ VIDEO ABSPIELEN</button>
      </div>

      <div id="car-ui">
        <div class="qr-hint">Öffne den QR-Scanner & scanne den Auto-Code!</div><br>
        <button class="action-btn" onclick="adjustCarScale(1.2)">GRÖSSER (+)</button>
        <button class="action-btn" onclick="adjustCarScale(0.8)">KLEINER (-)</button>
        <button class="action-btn" onclick="rotateCar(30)">DREHEN</button>
      </div>

      <div id="const-ui">
        <div style="background: rgba(0,0,0,0.6); color: white; padding: 5px; margin-bottom: 5px; border-radius: 5px; font-size: 12px;">Video-Entfernung</div>
        <button class="action-btn dist-btn" onclick="adjustVideoDist(0.5)">NÄHER RAN</button>
        <button class="action-btn dist-btn" onclick="adjustVideoDist(-0.5)">WEITER WEG</button>
        <br>
        <button class="action-btn" onclick="playConstructionVideo()">▶ VIDEO STARTEN</button>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true;">
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
        <a-asset-item id="carModel" src="car.glb"></a-asset-item>
        <video id="winVid" src="video.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        <video id="constVid" src="construction.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-entity id="game-entities" visible="false">
        <a-entity id="plane" gltf-model="#planeModel" position="0 1 -5" scale="0.03 0.03 0.03"></a-entity>
        <a-entity id="balloon-container"></a-entity>
        <a-video id="win-video-entity" src="#winVid" position="0 1.2 -3.5" width="3" height="1.7" visible="false"></a-video>
      </a-entity>

      <a-entity id="car-entities" visible="false">
        <a-entity id="car" gltf-model="#carModel" position="0 0.5 -3" scale="0.5 0.5 0.5"></a-entity>
      </a-entity>

      <a-video id="const-video-entity" src="#constVid" position="0 1.0 -3" width="3" height="1.7" visible="false"></a-video>

      <a-entity camera look-controls id="main-cam"></a-entity>
      <a-light type="ambient" intensity="1.2"></a-light>
    </a-scene>

    <script>
      const plane = document.querySelector('#plane');
      const car = document.querySelector('#car');
      const winVid = document.querySelector('#winVid');
      const constVid = document.querySelector('#constVid');
      const constEntity = document.querySelector('#const-video-entity');
      const scoreEl = document.querySelector('#score');
      
      let currentMode = 'none';
      let score = 0, isFrozen = false, move = {up:false,down:false,left:false,right:false};

      function switchMode(mode) {
        currentMode = mode;
        document.getElementById('game-ui').style.display = (mode === 'game' ? 'block' : 'none');
        document.getElementById('car-ui').style.display = (mode === 'car' ? 'block' : 'none');
        document.getElementById('const-ui').style.display = (mode === 'video' ? 'block' : 'none');
        document.getElementById('win-panel').style.display = 'none';
        
        document.getElementById('game-entities').setAttribute('visible', mode === 'game');
        document.getElementById('car-entities').setAttribute('visible', mode === 'car');
        constEntity.setAttribute('visible', mode === 'video');

        winVid.pause(); constVid.pause();
        document.getElementById('win-video-entity').setAttribute('visible', 'false');

        if (mode === 'game') resetGame();

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + (mode==='video'?'video':mode)).classList.add('active');
      }

      // KORRIGIERTE ENTFERNUNGS-LOGIK
      function adjustVideoDist(val) {
        let pos = constEntity.getAttribute('position');
        pos.z += val; // Val ist positiv für "Näher ran" (z.B. von -3 auf -2.5)
        if (pos.z > -1) pos.z = -1;
        if (pos.z < -10) pos.z = -10;
        constEntity.setAttribute('position', pos);
      }

      function resetGame() {
        score = 0; scoreEl.innerText = "0"; isFrozen = false;
        plane.setAttribute('position', '0 1 -5');
        const container = document.getElementById('balloon-container');
        container.innerHTML = ''; 
        for(let i=0; i<5; i++) {
          const b = document.createElement('a-entity');
          let x = (Math.random() - 0.5) * 35;
          let z = (Math.random() - 0.5) * 35;
          if (Math.abs(x) < 8) x += (x < 0 ? -10 : 10);
          if (Math.abs(z) < 8) z += (z < 0 ? -10 : 10);
          b.setAttribute('position', `${x} ${Math.random() * 2 + 1.2} ${z}`);
          b.innerHTML = `<a-sphere color="red" radius="0.4"></a-sphere><a-cone color="orange" radius-bottom="0.1" height="0.3" position="0 -0.4 0"></a-cone>`;
          container.appendChild(b);
        }
      }

      function playWinVideo() {
        document.getElementById('win-panel').style.display = 'none';
        document.getElementById('win-video-entity').setAttribute('visible', 'true');
        winVid.muted = false; winVid.play();
      }

      function playConstructionVideo() { 
        constVid.muted = false; constVid.play(); 
      }

      function rotateCar(d) { let r = car.getAttribute('rotation'); r.y += d; car.setAttribute('rotation', r); }
      function adjustCarScale(f) { let s = car.getAttribute('scale'); s.x *= f; s.y *= f; s.z *= f; car.setAttribute('scale', s); }

      const bind = (id, dir) => {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); move[dir] = true; };
        const end = () => move[dir] = false;
        btn.addEventListener('touchstart', start); btn.addEventListener('touchend', end);
        btn.addEventListener('mousedown', start); btn.addEventListener('mouseup', end);
      };
      ['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));
      document.getElementById('freeze').addEventListener('click', () => isFrozen = !isFrozen);

      function update() {
        if (currentMode === 'game' && !isFrozen) {
          let pPos = plane.getAttribute('position');
          let pRot = plane.getAttribute('rotation');
          if (move.left) pRot.y += 3; if (move.right) pRot.y -= 3;
          if (move.up) pPos.y += 0.07; if (move.down) pPos.y -= 0.07;
          let rad = pRot.y * (Math.PI / 180);
          pPos.x += Math.sin(rad) * 0.07; pPos.z += Math.cos(rad) * 0.07;
          plane.setAttribute('position', pPos); plane.setAttribute('rotation', pRot);

          document.querySelectorAll('#balloon-container a-entity').forEach(b => {
            let bPos = b.getAttribute('position');
            let d = Math.sqrt(Math.pow(pPos.x-bPos.x,2)+Math.pow(pPos.y-bPos.y,2)+Math.pow(pPos.z-bPos.z,2));
            if (d < 2.0) {
              score++; scoreEl.innerText = score;
              b.parentNode.removeChild(b);
              if (score >= 5) { isFrozen = true; document.getElementById('win-panel').style.display = 'block'; }
            }
          });

          let cam3D = document.querySelector('#main-cam').object3D;
          let angle = Math.atan2(pPos.x - cam3D.position.x, pPos.z - cam3D.position.z) * (180 / Math.PI);
          let camRotY = document.querySelector('#main-cam').getAttribute('rotation').y;
          document.querySelector('#radar-center').style.transform = `translate(-50%, -50%) rotate(${-(angle - camRotY + 180)}deg)`;
        }
        requestAnimationFrame(update);
      }
      update();
    </script>
  </body>
</html>
