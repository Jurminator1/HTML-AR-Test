<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: 60px 60px 60px; gap: 10px; z-index: 999; }
      button { width: 60px; height: 60px; background: rgba(255,255,255,0.8); border: none; border-radius: 50%; font-weight: bold; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="controls">
      <div></div><button id="up">UP</button><div></div>
      <button id="left">L</button><button id="down">DN</button><button id="right">R</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
      </a-assets>

      <a-entity id="plane" 
                gltf-model="#planeModel" 
                position="0 0 -5" 
                scale="0.5 0.5 0.5">
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const plane = document.querySelector('#plane');
      let move = { up: false, down: false, left: false, right: false };

      const bind = (id, dir) => {
        const btn = document.getElementById(id);
        btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); move[dir] = true; };
        btn.onmouseup = btn.ontouchend = () => move[dir] = false;
      };

      ['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));

      function update() {
        let p = plane.getAttribute('position');
        if (move.up) p.y += 0.05;
        if (move.down) p.y -= 0.05;
        if (move.left) p.x -= 0.05;
        if (move.right) p.x += 0.05;
        plane.setAttribute('position', p);
        requestAnimationFrame(update);
      }
      update();
    </script>
  </body>
</html>
