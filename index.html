<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: transparent; font-family: sans-serif; }
      #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
      #score-tag { position: absolute; top: 20px; left: 20px; color: #ffff00; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 5px; border: 2px solid #ffff00; pointer-events: auto; font-size: 20px; font-weight: bold; }
      #radar-center { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); }
      #arrow { position: absolute; bottom: 80px; left: -20px; width: 40px; height: 50px; background-color: #ffff00; clip-path: polygon(50% 0%, 100% 45%, 75% 45%, 75% 100%, 25% 100%, 25% 45%, 0% 45%); filter: drop-shadow(0 0 10px rgba(255, 255, 0, 0.9)); }
      #controls-container { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
      .btn-row { display: flex; justify-content: center; gap: 10px; margin: 5px 0; }
      button { width: 65px; height: 65px; background: rgba(0, 0, 0, 0.8); color: white; border: 2px solid #ffff00; border-radius: 50%; font-weight: bold; touch-action: manipulation; }
      #freeze { background: rgba(0, 80, 255, 0.7); border-color: #00ccff; }
      #freeze.active { background: #00ccff; color: #000; }
    </style>
  </head>
  <body>

    <div id="ui-layer">
      <div id="score-tag">SCORE: <span id="score">0</span></div>
      <div id="radar-center"><div id="arrow"></div></div>
      <div id="controls-container">
        <div class="btn-row"><button id="up">UP</button></div>
        <div class="btn-row"><button id="left">LEFT</button><button id="freeze">FREEZE</button><button id="right">RIGHT</button></div>
        <div class="btn-row"><button id="down">DOWN</button></div>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" renderer="logarithmicDepthBuffer: true;">
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
      </a-assets>

      <a-entity id="plane" gltf-model="#planeModel" position="0 1 -5" scale="0.03 0.03 0.03"></a-entity>
      <a-entity id="balloon-container"></a-entity>

      <a-entity id="camera-rig">
         <a-entity camera look-controls id="main-cam"></a-entity>
      </a-entity>
      
      <a-light type="ambient" intensity="1.5"></a-light>
    </a-scene>

    <script>
      const plane = document.querySelector('#plane');
      const balloonContainer = document.querySelector('#balloon-container');
      const radarCenter = document.querySelector('#radar-center');
      const scoreEl = document.querySelector('#score');
      const cam = document.querySelector('#main-cam');
      const freezeBtn = document.querySelector('#freeze');
      
      let score = 0;
      let gameActive = false;
      let isFrozen = false;
      let move = { up: false, down: false, left: false, right: false };
      const speed = 0.07;
      const turnSpeed = 3.0;

      freezeBtn.addEventListener('click', () => {
        isFrozen = !isFrozen;
        freezeBtn.classList.toggle('active', isFrozen);
        freezeBtn.innerText = isFrozen ? "UNFREEZE" : "FREEZE";
      });

      const bind = (id, dir) => {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); move[dir] = true; gameActive = true; };
        const end = () => move[dir] = false;
        btn.addEventListener('touchstart', start); btn.addEventListener('touchend', end);
        btn.addEventListener('mousedown', start); btn.addEventListener('mouseup', end);
      };
      ['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));

      function resetBalloonPosition(el) {
        let x = (Math.random() - 0.5) * 40;
        let z = (Math.random() - 0.5) * 40;
        if (Math.abs(x) < 5) x += 10; 
        el.setAttribute('position', `${x} ${Math.random() * 8 + 1} ${z}`);
      }

      for(let i=0; i<5; i++) {
        const b = document.createElement('a-entity');
        resetBalloonPosition(b);
        b.innerHTML = `<a-sphere color="#ff0000" radius="0.4"></a-sphere><a-cone color="#ffaa00" radius-bottom="0.15" height="0.5" position="0 -0.5 0"></a-cone>`;
        balloonContainer.appendChild(b);
      }

      function update() {
        let pPos = plane.getAttribute('position');
        let pRot = plane.getAttribute('rotation');
        let cRot = cam.getAttribute('rotation');
        let cPos = cam.object3D.position; // Using Three.js position for better accuracy

        if (!isFrozen) {
            if (move.left) pRot.y += turnSpeed;
            if (move.right) pRot.y -= turnSpeed;
            if (move.up) pPos.y += speed;
            if (move.down) pPos.y -= speed;

            const rad = pRot.y * (Math.PI / 180);
            
            // FLIPPED SIGNS: Changed to += to fix backward travel
            pPos.x += Math.sin(rad) * speed; 
            pPos.z += Math.cos(rad) * speed;

            plane.setAttribute('position', pPos);
            plane.setAttribute('rotation', pRot);

            if (gameActive) {
                balloonContainer.querySelectorAll('a-entity').forEach(b => {
                    let bPos = b.getAttribute('position');
                    let d = Math.sqrt(Math.pow(pPos.x-bPos.x,2)+Math.pow(pPos.y-bPos.y,2)+Math.pow(pPos.z-bPos.z,2));
                    if (d < 1.2) {
                        score++;
                        scoreEl.innerText = score;
                        resetBalloonPosition(b);
                    }
                });
            }
        }

        // Radar math using relative camera position
        let dx = pPos.x - cPos.x;
        let dz = pPos.z - cPos.z;
        let angleToPlane = Math.atan2(dx, dz) * (180 / Math.PI);
        let finalAngle = angleToPlane - cRot.y + 180;
        
        radarCenter.style.transform = `translate(-50%, -50%) rotate(${-finalAngle}deg)`;

        requestAnimationFrame(update);
      }
      update();
    </script>
  </body>
</html>
