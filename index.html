<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: transparent; font-family: sans-serif; }
      
      /* HUD Layer */
      #ui-layer {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none; z-index: 1000;
      }

      /* Scoreboard */
      #score-tag {
        position: absolute; top: 20px; left: 20px; color: white;
        background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px;
      }

      /* Fixed Controls Layout */
      #controls-wrapper {
        position: absolute; bottom: 30px; left: 0; width: 100%;
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        pointer-events: auto; /* Re-enable clicks for buttons */
      }
      .row { display: flex; gap: 15px; }
      
      button {
        width: 75px; height: 75px; background: rgba(0, 0, 0, 0.7); color: white;
        border: 2px solid white; border-radius: 50%; font-weight: bold;
        touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      }

      /* Radar Arrow */
      #arrow {
        position: absolute; top: 50%; left: 50%; width: 0; height: 0;
        border-left: 15px solid transparent; border-right: 15px solid transparent;
        border-bottom: 30px solid #ffff00;
        transform-origin: 50% 100px; /* Pivots around center of screen */
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <div id="ui-layer">
      <div id="score-tag">Score: <span id="score">0</span></div>
      <div id="arrow"></div>

      <div id="controls-wrapper">
        <div class="row">
          <button id="up">UP</button>
        </div>
        <div class="row">
          <button id="left">LEFT</button>
          <button id="down">DOWN</button>
          <button id="right">RIGHT</button>
        </div>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true;">
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
      </a-assets>

      <a-entity id="plane" gltf-model="#planeModel" position="0 1 -3" scale="0.05 0.05 0.05" rotation="0 0 0"></a-entity>

      <a-entity id="balloon" position="2 1.5 -8">
        <a-sphere color="red" radius="0.4"></a-sphere>
        <a-cone color="orange" radius-bottom="0.15" height="0.5" position="0 -0.5 0"></a-cone>
      </a-entity>

      <a-entity camera look-controls></a-entity>
      <a-light type="ambient" intensity="1.5"></a-light>
    </a-scene>

    <script>
      const plane = document.querySelector('#plane');
      const balloon = document.querySelector('#balloon');
      const arrow = document.querySelector('#arrow');
      const scoreEl = document.querySelector('#score');
      
      let score = 0;
      let move = { up: false, down: false, left: false, right: false };
      const speed = 0.04;
      const turn = 3.0;

      // Improved Button Binding
      const bind = (id, dir) => {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); move[dir] = true; };
        const end = () => move[dir] = false;
        
        btn.addEventListener('touchstart', start);
        btn.addEventListener('touchend', end);
        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', end);
      };

      ['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));

      function update() {
        let pPos = plane.getAttribute('position');
        let pRot = plane.getAttribute('rotation');

        // 1. Steering
        if (move.left) pRot.y += turn;
        if (move.right) pRot.y -= turn;
        if (move.up) pPos.y += speed;
        if (move.down) pPos.y -= speed;

        // 2. Flight Math (Corrected for Facing Direction)
        const angleRad = pRot.y * (Math.PI / 180);
        // We use += here because your model's "front" is likely facing the negative Z
        pPos.x += Math.sin(angleRad) * speed;
        pPos.z += Math.cos(angleRad) * speed;

        plane.setAttribute('position', pPos);
        plane.setAttribute('rotation', pRot);

        // 3. Collision Logic
        let bPos = balloon.getAttribute('position');
        let dist = Math.sqrt(Math.pow(pPos.x-bPos.x,2) + Math.pow(pPos.y-bPos.y,2) + Math.pow(pPos.z-bPos.z,2));
        
        if (dist < 0.8) {
          score++;
          scoreEl.innerText = score;
          balloon.setAttribute('position', `${(Math.random()-0.5)*15} ${Math.random()*3} ${(Math.random()-0.5)*15}`);
        }

        // 4. Arrow Radar (Point to plane)
        // This is a simplified 2D radar
        let angleToPlane = Math.atan2(pPos.x, pPos.z) * (180 / Math.PI);
        arrow.style.transform = `translate(-50%, -50%) rotate(${angleToPlane}deg) translateY(-120px)`;

        requestAnimationFrame(update);
      }
      update();
    </script>
  </body>
</html>
