<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: transparent; font-family: sans-serif; }
      
      #ui-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 1000;
      }

      #score-tag {
        position: absolute; top: 20px; left: 20px; color: #fff;
        background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; 
        border: 2px solid #ffff00; pointer-events: auto; font-weight: bold;
      }

      /* THE REAL ARROW */
      #radar-center {
        position: absolute; top: 50%; left: 50%;
        width: 4px; height: 4px; transform: translate(-50%, -50%);
      }

      #arrow {
        position: absolute;
        bottom: 60px; /* Distance from center of screen */
        left: -15px;
        width: 30px; height: 40px;
        background-color: #ffff00;
        /* Custom arrow shape with tail */
        clip-path: polygon(50% 0%, 100% 40%, 70% 40%, 70% 100%, 30% 100%, 30% 40%, 0% 40%);
        filter: drop-shadow(0 0 5px gold);
        transition: transform 0.1s linear;
      }

      #controls-container {
        position: absolute; bottom: 30px; width: 100%;
        display: flex; flex-direction: column; align-items: center;
        pointer-events: auto;
      }

      .btn-row { display: flex; justify-content: center; gap: 15px; margin: 5px 0; }
      
      button {
        width: 70px; height: 70px; background: rgba(0, 0, 0, 0.8); color: white;
        border: 2px solid #fff; border-radius: 50%; font-weight: bold;
        touch-action: manipulation;
      }
      button:active { background: white; color: black; }
    </style>
  </head>
  <body>

    <div id="ui-layer">
      <div id="score-tag">SCORE: <span id="score">0</span></div>
      
      <div id="radar-center">
        <div id="arrow"></div>
      </div>

      <div id="controls-container">
        <div class="btn-row"><button id="up">UP</button></div>
        <div class="btn-row">
          <button id="left">LEFT</button>
          <button id="down">DOWN</button>
          <button id="right">RIGHT</button>
        </div>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true;">
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
      </a-assets>

      <a-entity id="plane" gltf-model="#planeModel" position="0 1 -3" scale="0.05 0.05 0.05"></a-entity>

      <a-entity id="balloon-container"></a-entity>

      <a-entity camera look-controls id="main-cam"></a-entity>
      <a-light type="ambient" intensity="1.5"></a-light>
    </a-scene>

    <script>
      const plane = document.querySelector('#plane');
      const balloonContainer = document.querySelector('#balloon-container');
      const radarCenter = document.querySelector('#radar-center');
      const scoreEl = document.querySelector('#score');
      const cam = document.querySelector('#main-cam');
      
      let score = 0;
      let move = { up: false, down: false, left: false, right: false };
      const speed = 0.05;
      const turnSpeed = 2.5;

      // 1. Setup Controls
      const bind = (id, dir) => {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); move[dir] = true; };
        const end = () => move[dir] = false;
        btn.addEventListener('touchstart', start); btn.addEventListener('touchend', end);
        btn.addEventListener('mousedown', start); btn.addEventListener('mouseup', end);
      };
      ['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));

      // 2. Spawn 5 Balloons
      function createBalloon() {
        const b = document.createElement('a-entity');
        const x = (Math.random() - 0.5) * 20;
        const y = Math.random() * 5 + 1;
        const z = (Math.random() - 0.5) * 20;
        b.setAttribute('position', `${x} ${y} ${z}`);
        b.innerHTML = `
          <a-sphere color="#ff2222" radius="0.4"></a-sphere>
          <a-cone color="#ffa500" radius-bottom="0.15" height="0.5" position="0 -0.5 0"></a-cone>
        `;
        balloonContainer.appendChild(b);
      }

      for(let i=0; i<5; i++) createBalloon();

      // 3. Game Loop
      function update() {
        let pPos = plane.getAttribute('position');
        let pRot = plane.getAttribute('rotation');
        let cRot = cam.getAttribute('rotation');

        // Movement
        if (move.left) pRot.y += turnSpeed;
        if (move.right) pRot.y -= turnSpeed;
        if (move.up) pPos.y += speed;
        if (move.down) pPos.y -= speed;

        const rad = pRot.y * (Math.PI / 180);
        pPos.x -= Math.sin(rad) * speed; // Standard flight direction
        pPos.z -= Math.cos(rad) * speed;

        plane.setAttribute('position', pPos);
        plane.setAttribute('rotation', pRot);

        // Check Collision with all 5 balloons
        const balloons = balloonContainer.querySelectorAll('a-entity');
        balloons.forEach(b => {
          let bPos = b.getAttribute('position');
          let d = Math.sqrt(Math.pow(pPos.x-bPos.x,2)+Math.pow(pPos.y-bPos.y,2)+Math.pow(pPos.z-bPos.z,2));
          if (d < 0.8) {
            score++;
            scoreEl.innerText = score;
            // Respawn this balloon
            b.setAttribute('position', `${(Math.random()-0.5)*20} ${Math.random()*5+1} ${(Math.random()-0.5)*20}`);
          }
        });

        // RADAR LOGIC: Point at plane relative to camera view
        // Calculate vector from camera (0,0,0) to plane
        let angleToPlane = Math.atan2(pPos.x, pPos.z) * (180 / Math.PI);
        // Combine with camera's current look direction
        let finalAngle = angleToPlane + cRot.y + 180;
        
        radarCenter.style.transform = `translate(-50%, -50%) rotate(${finalAngle}deg)`;

        requestAnimationFrame(update);
      }
      update();
    </script>
  </body>
</html>
