<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Ensure the camera feed can be seen behind the UI */
      body { margin: 0; overflow: hidden; background-color: transparent; }
      #controls {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: 70px 70px 70px;
        gap: 15px;
        z-index: 1000; /* Keeps buttons above the camera */
      }
      button {
        width: 70px;
        height: 70px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: 2px solid white;
        border-radius: 50%;
        font-size: 14px;
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>

    <div id="controls">
      <div></div><button id="up">UP</button><div></div>
      <button id="left">LEFT</button><button id="down">DOWN</button><button id="right">RIGHT</button>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      renderer="alpha: true; colorManagement: true; antialias: true;">
      
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
      </a-assets>

      <a-entity id="plane" 
                gltf-model="#planeModel" 
                position="0 1.5 -5" 
                scale="0.2 0.2 0.2"
                rotation="0 180 0">
      </a-entity>

      <a-entity camera></a-entity>
      <a-light type="ambient" intensity="1"></a-light>
    </a-scene>

    <script>
      const plane = document.querySelector('#plane');
      let move = { up: false, down: false, left: false, right: false };
      
      // Flight constants
      const forwardSpeed = 0.03; // 2nd Fix: Constant speed
      const turnSpeed = 2;       // 3rd Fix: Rotation speed
      const verticalSpeed = 0.03;

      const bind = (id, dir) => {
        const btn = document.getElementById(id);
        btn.ontouchstart = (e) => { e.preventDefault(); move[dir] = true; };
        btn.ontouchend = () => move[dir] = false;
        // PC support for testing
        btn.onmousedown = () => move[dir] = true;
        btn.onmouseup = () => move[dir] = false;
      };

      ['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));

      function update() {
        let pos = plane.getAttribute('position');
        let rot = plane.getAttribute('rotation');

        // 3rd Fix: Change rotation (Y-axis) based on Left/Right
        if (move.left) rot.y += turnSpeed;
        if (move.right) rot.y -= turnSpeed;

        // Up/Down movement
        if (move.up) pos.y += verticalSpeed;
        if (move.down) pos.y -= verticalSpeed;

        // 2nd Fix: Constant Forward Movement based on current rotation
        // We convert degrees to radians for Math functions
        const angleRad = rot.y * (Math.PI / 180);
        pos.x -= Math.sin(angleRad) * forwardSpeed;
        pos.z -= Math.cos(angleRad) * forwardSpeed;

        plane.setAttribute('position', pos);
        plane.setAttribute('rotation', rot);
        
        requestAnimationFrame(update);
      }
      
      // Start the flight loop
      update();
    </script>
  </body>
</html>
