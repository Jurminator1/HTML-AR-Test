<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: transparent; font-family: 'Segoe UI', Arial, sans-serif; }
      
      #ui-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 1000;
      }

      #score-tag {
        position: absolute; top: 20px; left: 20px; color: #00ff00; font-weight: bold;
        background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; 
        border: 1px solid #00ff00; pointer-events: auto;
      }

      /* RADAR ARROW - Custom Shape */
      #arrow-container {
        position: absolute; top: 50%; left: 50%;
        width: 100px; height: 100px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      #arrow {
        width: 30px; height: 40px;
        background-color: #ffff00;
        clip-path: polygon(50% 0%, 100% 50%, 70% 50%, 70% 100%, 30% 100%, 30% 50%, 0% 50%);
        position: absolute; top: -80px; left: 35px; /* Offset from center */
        filter: drop-shadow(0 0 5px rgba(255, 255, 0, 0.8));
      }

      #controls-container {
        position: absolute; bottom: 40px; width: 100%;
        display: flex; flex-direction: column; align-items: center;
        pointer-events: auto;
      }

      .btn-row { display: flex; justify-content: center; gap: 15px; margin: 8px 0; }
      
      button {
        width: 75px; height: 75px; background: rgba(0, 0, 0, 0.7); color: white;
        border: 2px solid #00ff00; border-radius: 50%; font-weight: bold;
        touch-action: manipulation; -webkit-user-select: none;
      }
      button:active { background: #00ff00; color: black; }
    </style>
  </head>
  <body>

    <div id="ui-layer">
      <div id="score-tag">SCORE: <span id="score">0</span></div>
      
      <div id="arrow-container">
        <div id="arrow"></div>
      </div>

      <div id="controls-container">
        <div class="btn-row">
          <button id="up">UP</button>
        </div>
        <div class="btn-row">
          <button id="left">LEFT</button>
          <button id="down">DOWN</button>
          <button id="right">RIGHT</button>
        </div>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true;">
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
      </a-assets>

      <a-entity id="plane" gltf-model="#planeModel" position="0 1 -3" scale="0.05 0.05 0.05" rotation="0 0 0"></a-entity>

      <a-entity id="balloon" position="2 1.5 -6">
        <a-sphere color="#ff2222" radius="0.4" animation="property: position; dir: alternate; dur: 1000; easing: easeInOutSine; loop: true; to: 0 0.2 0"></a-sphere>
        <a-cone color="#ffa500" radius-bottom="0.15" height="0.5" position="0 -0.5 0"></a-cone>
      </a-entity>

      <a-entity id="rig" camera look-controls position="0 0 0"></a-entity>
      <a-light type="ambient" intensity="1.5"></a-light>
    </a-scene>

    <script>
      const REVERSE_FLIGHT = false; 
      const plane = document.querySelector('#plane');
      const balloon = document.querySelector('#balloon');
      const arrowContainer = document.querySelector('#arrow-container');
      const scoreEl = document.querySelector('#score');
      const camera = document.querySelector('[camera]');
      
      let score = 0;
      let move = { up: false, down: false, left: false, right: false };
      const speed = 0.04;
      const turnSpeed = 2.5;

      // Controller Binding
      const bind = (id, dir) => {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); move[dir] = true; };
        const end = () => move[dir] = false;
        btn.addEventListener('touchstart', start);
        btn.addEventListener('touchend', end);
        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', end);
      };
      ['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));

      function update() {
        let pPos = plane.getAttribute('position');
        let pRot = plane.getAttribute('rotation');
        let cRot = camera.getAttribute('rotation');

        // Flight Logic
        if (move.left) pRot.y += turnSpeed;
        if (move.right) pRot.y -= turnSpeed;
        if (move.up) pPos.y += speed;
        if (move.down) pPos.y -= speed;

        const angleRad = pRot.y * (Math.PI / 180);
        const modifier = REVERSE_FLIGHT ? -1 : 1;

        pPos.x += Math.sin(angleRad) * speed * modifier;
        pPos.z += Math.cos(angleRad) * speed * modifier;

        plane.setAttribute('position', pPos);
        plane.setAttribute('rotation', pRot);

        // Collision Check
        let bPos = balloon.getAttribute('position');
        let dist = Math.sqrt(Math.pow(pPos.x-bPos.x,2)+Math.pow(pPos.y-bPos.y,2)+Math.pow(pPos.z-bPos.z,2));
        if (dist < 0.8) {
          score++; 
          scoreEl.innerText = score;
          balloon.setAttribute('position', `${(Math.random()-0.5)*15} ${Math.random()*3+1} ${(Math.random()-0.5)*15}`);
        }

        // IMPROVED RADAR LOGIC
        // 1. Get angle to the plane from camera (0,0,0 relative)
        let angleToPlane = Math.atan2(pPos.x, pPos.z) * (180 / Math.PI);
        
        // 2. Adjust for camera's horizontal rotation (Y-axis)
        // We add 180 because atan2(0, -z) is 180deg
        let finalRadarAngle = angleToPlane + cRot.y;

        // 3. Apply to UI
        arrowContainer.style.transform = `translate(-50%, -50%) rotate(${finalRadarAngle}deg)`;

        requestAnimationFrame(update);
      }
      update();
    </script>
  </body>
</html>
