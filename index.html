<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Plane Game</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }

    button {
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: rgba(0,0,0,0.6);
      color: white;
    }
  </style>
</head>

<body>

<div class="controls">
  <button onclick="moveForward()">↑</button>
  <button onclick="moveDown()">↓</button>
  <button onclick="turnLeft()">←</button>
  <button onclick="turnRight()">→</button>
</div>

<a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

  <a-marker preset="hiro">

    <!-- Plane model -->
    <a-entity 
      id="plane"
      gltf-model="plane.glb"
      scale="0.5 0.5 0.5"
      position="0 0.5 0">
    </a-entity>

    <!-- Camera rig -->
    <a-entity id="cameraRig">
      <a-entity camera></a-entity>
    </a-entity>

  </a-marker>

</a-scene>

<script>
  const plane = document.querySelector("#plane");
  const cameraRig = document.querySelector("#cameraRig");

  let rotationY = 0;
  let speed = 0.05;

  function moveForward() {
    const pos = plane.getAttribute("position");
    pos.x -= Math.sin(rotationY) * speed;
    pos.z -= Math.cos(rotationY) * speed;
    plane.setAttribute("position", pos);
    updateCamera();
  }

  function moveDown() {
    const pos = plane.getAttribute("position");
    pos.y -= 0.1;
    plane.setAttribute("position", pos);
    updateCamera();
  }

  function turnLeft() {
    rotationY += 0.1;
    plane.setAttribute("rotation", { x: 0, y: rotationY * 57.3, z: 0 });
    updateCamera();
  }

  function turnRight() {
    rotationY -= 0.1;
    plane.setAttribute("rotation", { x: 0, y: rotationY * 57.3, z: 0 });
    updateCamera();
  }

  function updateCamera() {
    const pos = plane.getAttribute("position");

    const camX = pos.x + Math.sin(rotationY) * 3;
    const camZ = pos.z + Math.cos(rotationY) * 3;

    cameraRig.setAttribute("position", {
      x: camX,
      y: pos.y + 2,
      z: camZ
    });

    cameraRig.object3D.lookAt(plane.object3D.position);
  }
</script>

</body>
</html>
