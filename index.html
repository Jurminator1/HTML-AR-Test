<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* CRITICAL: Background must be transparent for the camera to show through */
      body { margin: 0; overflow: hidden; background-color: transparent !important; font-family: sans-serif; }
      
      #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
      
      /* MENU */
      #main-menu {
        position: absolute; top: 15px; width: 100%;
        display: flex; justify-content: center; gap: 8px; pointer-events: auto;
      }
      .nav-btn {
        padding: 8px 12px; background: rgba(0,0,0,0.8); color: white;
        border: 2px solid #fff; border-radius: 5px; font-size: 11px; font-weight: bold;
      }
      .nav-btn.active { background: #ffff00; color: #000; border-color: #ffff00; }

      /* GAME UI */
      #game-ui { display: none; width: 100%; height: 100%; position: relative; }
      #score-tag { position: absolute; top: 70px; left: 20px; color: #ffff00; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 5px; border: 2px solid #ffff00; pointer-events: auto; }
      #radar-center { position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; }
      #arrow { position: absolute; bottom: 80px; left: -20px; width: 40px; height: 50px; background-color: #ffff00; clip-path: polygon(50% 0%, 100% 45%, 75% 45%, 75% 100%, 25% 100%, 25% 45%, 0% 45%); }
      
      #controls-container { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
      .btn-row { display: flex; justify-content: center; gap: 10px; margin: 5px 0; }
      .ctrl-btn { width: 60px; height: 60px; background: rgba(0,0,0,0.7); color: white; border: 2px solid #fff; border-radius: 50%; font-weight: bold; touch-action: manipulation; }

      /* CAR UI - Expand/Decrease size */
      #car-ui { display: none; position: absolute; bottom: 40px; width: 100%; text-align: center; pointer-events: auto; }
      .car-btn { padding: 12px; margin: 4px; background: #00ccff; border: none; border-radius: 5px; color: white; font-weight: bold; }
    </style>
  </head>
  <body>

    <div id="ui-layer">
      <div id="main-menu">
        <button class="nav-btn" id="btn-game" onclick="switchMode('game')">1. GAME</button>
        <button class="nav-btn" id="btn-car" onclick="switchMode('car')">2. CAR</button>
        <button class="nav-btn" id="btn-video" onclick="switchMode('video')">3. VIDEO</button>
      </div>

      <div id="game-ui">
        <div id="score-tag">SCORE: <span id="score">0</span></div>
        <div id="radar-center"><div id="arrow"></div></div>
        <div id="controls-container">
          <div class="btn-row"><button class="ctrl-btn" id="up">UP</button></div>
          <div class="btn-row"><button class="ctrl-btn" id="left">LEFT</button><button class="ctrl-btn" id="freeze" style="background: #0050ff;">FREEZE</button><button class="ctrl-btn" id="right">RIGHT</button></div>
          <div class="btn-row"><button class="ctrl-btn" id="down">DOWN</button></div>
        </div>
      </div>

      <div id="car-ui">
        <div style="margin-bottom: 10px;">
          <button class="car-btn" onclick="adjustCarScale(1.2)">EXPAND (+)</button>
          <button class="car-btn" onclick="adjustCarScale(0.8)">SHRINK (-)</button>
        </div>
        <button class="car-btn" onclick="rotateCar(-15)">ROTATE L</button>
        <button class="car-btn" onclick="rotateCar(15)">ROTATE R</button>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true; colorManagement: true;">
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
        <a-asset-item id="carModel" src="car.glb"></a-asset-item>
        <video id="arVideo" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-entity id="game-entities" visible="false">
        <a-entity id="plane" gltf-model="#planeModel" position="0 1 -5" scale="0.03 0.03 0.03"></a-entity>
        <a-entity id="balloon-container"></a-entity>
      </a-entity>

      <a-entity id="car-entities" visible="false">
        <a-entity id="car" gltf-model="#carModel" position="0 0 -3" scale="0.5 0.5 0.5"></a-entity>
      </a-entity>

      <a-video id="video-entity" src="#arVideo" position="0 1.5 -3" width="3" height="1.7" visible="false"></a-video>

      <a-entity camera look-controls id="main-cam"></a-entity>
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" position="0 10 0" intensity="1.0"></a-light>
    </a-scene>

    <script>
      let currentMode = 'none';
      const plane = document.querySelector('#plane');
      const car = document.querySelector('#car');
      const videoAsset = document.querySelector('#arVideo');
      const scoreEl = document.querySelector('#score');

      function switchMode(mode) {
        currentMode = mode;
        
        // UI toggles
        document.getElementById('game-ui').style.display = (mode === 'game') ? 'block' : 'none';
        document.getElementById('car-ui').style.display = (mode === 'car') ? 'block' : 'none';
        
        // Entity toggles
        document.getElementById('game-entities').setAttribute('visible', (mode === 'game'));
        document.getElementById('car-entities').setAttribute('visible', (mode === 'car'));
        document.getElementById('video-entity').setAttribute('visible', (mode === 'video'));

        // Logic resets
        if (mode === 'video') videoAsset.play(); else videoAsset.pause();
        if (mode === 'game') {
          score = 0; scoreEl.innerText = "0";
          plane.setAttribute('position', '0 1 -5');
          if(document.getElementById('balloon-container').children.length === 0) spawnBalloons();
        }

        // Button highlight
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
      }

      // --- CAR LOGIC ---
      function rotateCar(deg) {
        let rot = car.getAttribute('rotation');
        rot.y += deg;
        car.setAttribute('rotation', rot);
      }
      function adjustCarScale(factor) {
        let sc = car.getAttribute('scale');
        sc.x *= factor; sc.y *= factor; sc.z *= factor;
        car.setAttribute('scale', sc);
      }

      // --- GAME LOGIC ---
      let score = 0, isFrozen = false, move = {up:false,down:false,left:false,right:false};
      function spawnBalloons() {
        const container = document.getElementById('balloon-container');
        for(let i=0; i<5; i++) {
          const b = document.createElement('a-entity');
          b.setAttribute('position', `${(Math.random()-0.5)*30} ${Math.random()*4+1} ${(Math.random()-0.5)*30}`);
          b.innerHTML = `<a-sphere color="red" radius="0.4"></a-sphere><a-cone color="orange" radius-bottom="0.1" height="0.3" position="0 -0.4 0"></a-cone>`;
          container.appendChild(b);
        }
      }

      const bind = (id, dir) => {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); move[dir] = true; };
        const end = () => move[dir] = false;
        btn.addEventListener('touchstart', start); btn.addEventListener('touchend', end);
        btn.addEventListener('mousedown', start); btn.addEventListener('mouseup', end);
      };
      ['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));
      document.getElementById('freeze').addEventListener('click', () => {
        isFrozen = !isFrozen;
        document.getElementById('freeze').style.background = isFrozen ? "#00ccff" : "#0050ff";
      });

      // --- MAIN LOOP ---
      function update() {
        if (currentMode === 'game' && !isFrozen) {
          let pPos = plane.getAttribute('position');
          let pRot = plane.getAttribute('rotation');
          if (move.left) pRot.y += 3;
          if (move.right) pRot.y -= 3;
          if (move.up) pPos.y += 0.07;
          if (move.down) pPos.y -= 0.07;
          let rad = pRot.y * (Math.PI / 180);
          pPos.x += Math.sin(rad) * 0.07;
          pPos.z += Math.cos(rad) * 0.07;
          plane.setAttribute('position', pPos);
          plane.setAttribute('rotation', pRot);

          // Balloon collision
          document.querySelectorAll('#balloon-container a-entity').forEach(b => {
            let bPos = b.getAttribute('position');
            let d = Math.sqrt(Math.pow(pPos.x-bPos.x,2)+Math.pow(pPos.y-bPos.y,2)+Math.pow(pPos.z-bPos.z,2));
            if (d < 1.0) {
              score++; scoreEl.innerText = score;
              b.setAttribute('position', `${(Math.random()-0.5)*30} ${Math.random()*4+1} ${(Math.random()-0.5)*30}`);
            }
          });

          // Radar
          let cPos = document.querySelector('#main-cam').object3D.position;
          let cRot = document.querySelector('#main-cam').getAttribute('rotation');
          let angle = Math.atan2(pPos.x - cPos.x, pPos.z - cPos.z) * (180 / Math.PI);
          document.querySelector('#radar-center').style.transform = `translate(-50%, -50%) rotate(${-(angle - cRot.y + 180)}deg)`;
        }
        requestAnimationFrame(update);
      }
      update();
    </script>
  </body>
</html>
