<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: transparent; font-family: Arial, sans-serif; }
      
      /* THE UI LAYER - Forced to cover the whole screen */
      #ui-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 1000;
      }

      #score-tag {
        position: absolute; top: 10px; left: 10px; color: white;
        background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 15px; pointer-events: auto;
      }

      /* Bulletproof Centering for Controls */
      #controls-container {
        position: absolute; bottom: 40px; width: 100%;
        display: flex; flex-direction: column; align-items: center;
        pointer-events: auto;
      }

      .btn-row { display: flex; justify-content: center; gap: 10px; margin: 5px 0; }
      
      button {
        width: 70px; height: 70px; background: rgba(0, 0, 0, 0.8); color: white;
        border: 2px solid #fff; border-radius: 50%; font-size: 12px;
        touch-action: manipulation; -webkit-user-select: none;
      }

      #arrow {
        position: absolute; top: 50%; left: 50%; width: 0; height: 0;
        border-left: 12px solid transparent; border-right: 12px solid transparent;
        border-bottom: 25px solid yellow;
        transform-origin: 50% 80px; transform: translate(-50%, -50%);
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <div id="ui-layer">
      <div id="score-tag">Score: <span id="score">0</span></div>
      <div id="arrow"></div>

      <div id="controls-container">
        <div class="btn-row">
          <button id="up">UP</button>
        </div>
        <div class="btn-row">
          <button id="left">LEFT</button>
          <button id="down">DOWN</button>
          <button id="right">RIGHT</button>
        </div>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true;">
      <a-assets>
        <a-asset-item id="planeModel" src="plane.glb"></a-asset-item>
      </a-assets>

      <a-entity id="plane" gltf-model="#planeModel" position="0 1 -3" scale="0.05 0.05 0.05" rotation="0 0 0"></a-entity>

      <a-entity id="balloon" position="2 1.5 -6">
        <a-sphere color="red" radius="0.4"></a-sphere>
        <a-cone color="orange" radius-bottom="0.15" height="0.5" position="0 -0.5 0"></a-cone>
      </a-entity>

      <a-entity camera look-controls></a-entity>
      <a-light type="ambient" intensity="1.5"></a-light>
    </a-scene>

    <script>
      // CONFIGURATION
      const REVERSE_FLIGHT = false; // CHANGE THIS TO false IF IT FLIES BACKWARDS
      const plane = document.querySelector('#plane');
      const balloon = document.querySelector('#balloon');
      const arrow = document.querySelector('#arrow');
      const scoreEl = document.querySelector('#score');
      
      let score = 0;
      let move = { up: false, down: false, left: false, right: false };
      const speed = 0.04;
      const turn = 2.5;

      const bind = (id, dir) => {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); move[dir] = true; };
        const end = () => move[dir] = false;
        btn.addEventListener('touchstart', start);
        btn.addEventListener('touchend', end);
        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', end);
      };

      ['up', 'down', 'left', 'right'].forEach(dir => bind(dir, dir));

      function update() {
        let pPos = plane.getAttribute('position');
        let pRot = plane.getAttribute('rotation');

        if (move.left) pRot.y += turn;
        if (move.right) pRot.y -= turn;
        if (move.up) pPos.y += speed;
        if (move.down) pPos.y -= speed;

        const angleRad = pRot.y * (Math.PI / 180);
        const modifier = REVERSE_FLIGHT ? -1 : 1;

        // Apply Flight
        pPos.x += Math.sin(angleRad) * speed * modifier;
        pPos.z += Math.cos(angleRad) * speed * modifier;

        plane.setAttribute('position', pPos);
        plane.setAttribute('rotation', pRot);

        // Score logic
        let bPos = balloon.getAttribute('position');
        let d = Math.sqrt(Math.pow(pPos.x-bPos.x,2)+Math.pow(pPos.y-bPos.y,2)+Math.pow(pPos.z-bPos.z,2));
        if (d < 0.7) {
          score++; scoreEl.innerText = score;
          balloon.setAttribute('position', `${(Math.random()-0.5)*12} ${Math.random()*2+1} ${(Math.random()-0.5)*12}`);
        }

        // // Radar Arrow Logic
const camera = document.querySelector('[camera]');
const camRot = camera.getAttribute('rotation');
const pPos = plane.getAttribute('position');

// 1. Get the angle from the origin to the plane on the horizontal plane
// Math.atan2(x, z) gives the angle in radians
let angleToPlane = Math.atan2(pPos.x, pPos.z) * (180 / Math.PI);

// 2. Subtract the camera's current Y rotation so the arrow 
// stays relative to where the player is looking
let relativeAngle = angleToPlane + camRot.y + 180; 

// 3. Apply the rotation
arrow.style.transform = `translate(-50%, -50%) rotate(${relativeAngle}deg) translateY(-80px)`; Arrow
        let angleToPlane = Math.atan2(pPos.x, pPos.z) * (180 / Math.PI);
        arrow.style.transform = `translate(-50%, -50%) rotate(${angleToPlane}deg) translateY(-80px)`;

        requestAnimationFrame(update);
      }
      update();
    </script>
  </body>
</html>
